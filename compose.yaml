services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edusecure}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-edusecure}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    image: eclipse-temurin:25-jdk
    working_dir: /workspace/backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-edusecure}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SUBMISSION_STORAGE_BASE_PATH: /var/lib/edusecure/submission-storage
    command: ["./gradlew", "-PedusecureBuildDir=/tmp/edusecure-backend-build", "bootRun", "--no-daemon"]
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./:/workspace
      - gradle_cache:/root/.gradle
      - submission_storage:/var/lib/edusecure/submission-storage
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /workspace/frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/workspace/frontend
      - frontend_node_modules:/workspace/frontend/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
  gradle_cache:
  submission_storage:
  frontend_node_modules:
