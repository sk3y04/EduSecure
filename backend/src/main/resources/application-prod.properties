auth.cookie.secure=${AUTH_COOKIE_SECURE:true}
auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
auth.cookie.path=${AUTH_COOKIE_PATH:/}
auth.cookie.domain=${AUTH_COOKIE_DOMAIN:}

# Startup validation rejects insecure production combinations, such as SameSite=None without
# Secure=true or running the prod profile with auth.cookie.secure=false.

# Set this to the deployed frontend origin(s). For a comma-separated list, quote the value in your
# shell or container environment so it is passed as a single property string.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://app.example.com}

