spring.application.name=EduSecure

server.port=${SERVER_PORT:8080}

spring.docker.compose.enabled=${SPRING_DOCKER_COMPOSE_ENABLED:false}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/edusecure}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/edusecure}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:edusecure}
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.repositories.enabled=false
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:6MB}

jwt.secret=${JWT_SECRET:QmFja2VuZEZvckVkdVNlY3VyZVN0dWR5UHJvamVjdEhlbHBTaWduaW5nS2V5MTIzNDU2Nzg5MDEyMzQ1Njc4OTA=}
jwt.expiration=${JWT_EXPIRATION:86400000}

auth.cookie.name=${AUTH_COOKIE_NAME:EDUSECURE_AUTH}
auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
auth.cookie.path=${AUTH_COOKIE_PATH:/}
auth.cookie.domain=${AUTH_COOKIE_DOMAIN:}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.chat.enabled=${APP_CHAT_ENABLED:false}
app.chat.message-max-length=${APP_CHAT_MESSAGE_MAX_LENGTH:2000}
app.chat.page-size-default=${APP_CHAT_PAGE_SIZE_DEFAULT:30}
app.chat.page-size-max=${APP_CHAT_PAGE_SIZE_MAX:100}
app.chat.e2ee.enabled=${APP_CHAT_E2EE_ENABLED:false}
app.chat.e2ee.require-registered-key=${APP_CHAT_E2EE_REQUIRE_REGISTERED_KEY:false}

mfa.secret-encryption-key=${MFA_SECRET_ENCRYPTION_KEY:ZmVkY2JhOTg3NjU0MzIxMGZlZGNiYTk4NzY1NDMyMTA=}
mfa.secret-key-version=${MFA_SECRET_KEY_VERSION:v1}
mfa.issuer=${MFA_ISSUER:EduSecure}
mfa.challenge-ttl-seconds=${MFA_CHALLENGE_TTL_SECONDS:300}
mfa.challenge-max-attempts=${MFA_CHALLENGE_MAX_ATTEMPTS:5}
mfa.recovery-code-count=${MFA_RECOVERY_CODE_COUNT:8}
mfa.totp-time-step-seconds=${MFA_TOTP_TIME_STEP_SECONDS:30}
mfa.totp-allowed-window=${MFA_TOTP_ALLOWED_WINDOW:1}
mfa.totp-code-digits=${MFA_TOTP_CODE_DIGITS:6}

audit.hmac-secret=${AUDIT_HMAC_SECRET:QXVkaXRJbnRlZ3JpdHlTZWNyZXRGb3JFZHVTZWN1cmVTdHVkeVByb2plY3QxMjM0NTY3ODkw}

crypto.signing.private-key-location=${CRYPTO_SIGNING_PRIVATE_KEY_LOCATION:classpath:crypto-demo-signing-private.pem}
crypto.signing.public-key-location=${CRYPTO_SIGNING_PUBLIC_KEY_LOCATION:classpath:crypto-demo-signing-public.pem}

submission.storage.master-key=${SUBMISSION_STORAGE_MASTER_KEY:c3VibWlzc2lvbi1zdG9yYWdlLW1hc3Rlci1rZXktMDE=}
submission.storage.master-key-version=${SUBMISSION_STORAGE_MASTER_KEY_VERSION:v1}
submission.storage.key-wrap-algorithm=${SUBMISSION_STORAGE_KEY_WRAP_ALGORITHM:AESWrap}
submission.storage.cipher-algorithm=${SUBMISSION_STORAGE_CIPHER_ALGORITHM:AES/GCM/NoPadding}
submission.storage.base-path=${SUBMISSION_STORAGE_BASE_PATH:./var/submission-storage}
submission.upload.allowed-content-types=${SUBMISSION_UPLOAD_ALLOWED_CONTENT_TYPES:text/plain,application/pdf}
submission.upload.max-file-size=${SUBMISSION_UPLOAD_MAX_FILE_SIZE:5MB}
