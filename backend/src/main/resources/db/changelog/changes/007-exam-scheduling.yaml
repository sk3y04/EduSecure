databaseChangeLog:
  - changeSet:
      id: 007-exam-scheduling
      author: edusecure
      changes:
        - createTable:
            tableName: exams
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_exams
                    nullable: false
              - column:
                  name: space_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(160)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: location
                  type: VARCHAR(160)
                  constraints:
                    nullable: false
              - column:
                  name: starts_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: ends_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: published
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: created_by_user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: exams
            baseColumnNames: space_id
            referencedTableName: spaces
            referencedColumnNames: id
            constraintName: fk_exams_space
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: exams
            baseColumnNames: created_by_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_exams_created_by_user
            onDelete: RESTRICT

        - createIndex:
            tableName: exams
            indexName: idx_exams_space_starts_at
            columns:
              - column:
                  name: space_id
              - column:
                  name: starts_at

        - createIndex:
            tableName: exams
            indexName: idx_exams_published_starts_at
            columns:
              - column:
                  name: published
              - column:
                  name: starts_at