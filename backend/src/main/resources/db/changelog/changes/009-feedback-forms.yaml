databaseChangeLog:
  - changeSet:
      id: 009-feedback-forms-create-feedback-forms
      author: edusecure
      changes:
        - createTable:
            tableName: feedback_forms
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: exam_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(160)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: published
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_by_user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: feedback_forms
            baseColumnNames: exam_id
            constraintName: fk_feedback_forms_exam_id
            referencedTableName: exams
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: feedback_forms
            baseColumnNames: created_by_user_id
            constraintName: fk_feedback_forms_created_by_user_id
            referencedTableName: users
            referencedColumnNames: id
        - createIndex:
            tableName: feedback_forms
            indexName: idx_feedback_forms_exam_id
            columns:
              - column:
                  name: exam_id

  - changeSet:
      id: 009-feedback-forms-create-feedback-form-questions
      author: edusecure
      changes:
        - createTable:
            tableName: feedback_form_questions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: form_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: prompt
                  type: VARCHAR(300)
                  constraints:
                    nullable: false
              - column:
                  name: question_type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: required
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: display_order
                  type: INTEGER
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: feedback_form_questions
            baseColumnNames: form_id
            constraintName: fk_feedback_form_questions_form_id
            referencedTableName: feedback_forms
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: feedback_form_questions
            columnNames: form_id, display_order
            constraintName: uk_feedback_form_questions_form_id_display_order
        - createIndex:
            tableName: feedback_form_questions
            indexName: idx_feedback_form_questions_form_id
            columns:
              - column:
                  name: form_id

  - changeSet:
      id: 009-feedback-forms-create-feedback-form-submissions
      author: edusecure
      changes:
        - createTable:
            tableName: feedback_form_submissions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: form_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: student_user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: submitted_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: feedback_form_submissions
            baseColumnNames: form_id
            constraintName: fk_feedback_form_submissions_form_id
            referencedTableName: feedback_forms
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: feedback_form_submissions
            baseColumnNames: student_user_id
            constraintName: fk_feedback_form_submissions_student_user_id
            referencedTableName: users
            referencedColumnNames: id
        - addUniqueConstraint:
            tableName: feedback_form_submissions
            columnNames: form_id, student_user_id
            constraintName: uk_feedback_form_submissions_form_id_student_user_id
        - createIndex:
            tableName: feedback_form_submissions
            indexName: idx_feedback_form_submissions_form_id
            columns:
              - column:
                  name: form_id

  - changeSet:
      id: 009-feedback-forms-create-feedback-form-answers
      author: edusecure
      changes:
        - createTable:
            tableName: feedback_form_answers
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: submission_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: question_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: rating_value
                  type: INTEGER
              - column:
                  name: text_value
                  type: TEXT
        - addForeignKeyConstraint:
            baseTableName: feedback_form_answers
            baseColumnNames: submission_id
            constraintName: fk_feedback_form_answers_submission_id
            referencedTableName: feedback_form_submissions
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: feedback_form_answers
            baseColumnNames: question_id
            constraintName: fk_feedback_form_answers_question_id
            referencedTableName: feedback_form_questions
            referencedColumnNames: id
        - addUniqueConstraint:
            tableName: feedback_form_answers
            columnNames: submission_id, question_id
            constraintName: uk_feedback_form_answers_submission_id_question_id
        - createIndex:
            tableName: feedback_form_answers
            indexName: idx_feedback_form_answers_submission_id
            columns:
              - column:
                  name: submission_id