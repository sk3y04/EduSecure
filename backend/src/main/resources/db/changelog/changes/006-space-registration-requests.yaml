databaseChangeLog:
  - changeSet:
      id: 006-space-registration-requests
      author: copilot
      changes:
        - createTable:
            tableName: space_registration_requests
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_space_registration_requests
                    nullable: false
              - column:
                  name: space_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: student_user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: request_message
                  type: VARCHAR(500)
              - column:
                  name: requested_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: reviewed_by_user_id
                  type: UUID
              - column:
                  name: reviewed_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: review_note
                  type: VARCHAR(500)

        - addForeignKeyConstraint:
            baseTableName: space_registration_requests
            baseColumnNames: space_id
            referencedTableName: spaces
            referencedColumnNames: id
            constraintName: fk_space_registration_requests_space
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: space_registration_requests
            baseColumnNames: student_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_space_registration_requests_student_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: space_registration_requests
            baseColumnNames: reviewed_by_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_space_registration_requests_reviewed_by_user
            onDelete: RESTRICT

        - createIndex:
            tableName: space_registration_requests
            indexName: idx_space_registration_requests_student_requested_at
            columns:
              - column:
                  name: student_user_id
              - column:
                  name: requested_at

        - createIndex:
            tableName: space_registration_requests
            indexName: idx_space_registration_requests_space_status
            columns:
              - column:
                  name: space_id
              - column:
                  name: status

        - createIndex:
            tableName: space_registration_requests
            indexName: idx_space_registration_requests_status_requested_at
            columns:
              - column:
                  name: status
              - column:
                  name: requested_at

        - sql:
            dbms: postgresql
            sql: CREATE UNIQUE INDEX uk_space_registration_requests_pending ON space_registration_requests (space_id, student_user_id) WHERE status = 'PENDING';